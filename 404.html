<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan — Suara Kampus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #EFF6FF 0%, #F8FAFC 50%, #F5F3FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .error-card {
            background: var(--surface);
            padding: 48px 32px;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            max-width: 480px;
            width: 100%;
            animation: scaleIn 0.35s ease-out;
            border: 1px solid var(--border);
        }

        .error-code {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, #8B5CF6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>

    <div class="error-card">
        <div class="error-code">404</div>
        <h1 style="font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary);">Halaman Tidak
            Ditemukan</h1>
        <p style="font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 28px;">
            Maaf, halaman yang Anda cari tidak ditemukan atau telah dipindahkan. Silakan kembali ke halaman utama.
        </p>
        <button onclick="goHome()" class="btn btn-primary ripple" style="width: 100%; justify-content: center;">
            Kembali ke Beranda
        </button>
    </div>

    <script>
        function goHome() {
            const user = JSON.parse(localStorage.getItem('sk_user') || 'null');
            if (user && localStorage.getItem('sk_token')) {
                window.location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'dashboard.html';
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
