<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — Suara Kampus ITG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: linear-gradient(135deg, #EFF6FF 0%, #F8FAFC 50%, #F5F3FF 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 460px; background: var(--surface); border-radius: var(--radius-2xl); box-shadow: var(--shadow-xl); padding: 40px; animation: scaleIn 0.35s ease-out; }
    </style>
</head>
<body>

<div class="auth-card">
    <div style="text-align:center;margin-bottom:28px">
        <a href="{{ url_for('index') }}" style="display:inline-flex;flex-direction:column;align-items:center;gap:12px">
            <div style="width:52px;height:52px;background:var(--primary);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-glow)">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
        </a>
    </div>

    <h1 style="font-size:20px;font-weight:700;text-align:center;margin-bottom:4px">Buat Akun Mahasiswa</h1>
    <p style="font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:24px">Silakan daftar menggunakan NIM yang valid</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div style="padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: 500;
                    {% if category == 'success' %}background: var(--success-light); border: 1px solid var(--success); color: var(--success);
                    {% elif category == 'danger' or category == 'error' %}background: var(--error-light); border: 1px solid var(--error); color: var(--error);
                    {% elif category == 'warning' %}background: var(--warning-light); border: 1px solid var(--warning); color: var(--warning);
                    {% else %}background: var(--primary-light); color: var(--primary);{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label class="form-label" for="nim">NIM (Nomor Induk Mahasiswa)</label>
            <input type="text" id="nim" name="nim" class="form-input" placeholder="Contoh: 2407043" required pattern="[0-9]+" title="Hanya angka">
        </div>
        <div class="form-group">
            <label class="form-label" for="full_name">Nama Lengkap</label>
            <input type="text" id="full_name" name="full_name" class="form-input" placeholder="Masukkan nama lengkap" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Minimal 6 karakter" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary ripple" style="width:100%;justify-content:center;padding:13px">Daftar Sekarang</button>
    </form>

    <p style="text-align:center;font-size:13px;color:var(--text-secondary);margin-top:20px">
        Sudah punya akun? <a href="{{ url_for('login') }}" style="color:var(--primary);font-weight:600">Masuk di sini</a>
    </p>
</div>
</body>
</html>
