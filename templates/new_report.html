{% extends "base.html" %}

{% block title %}Buat Laporan - Suara Kampus ITG{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1><i class="bi bi-plus-circle me-2"></i>Buat Laporan Baru</h1>
        <p>Sampaikan keluhan atau masalah yang kamu temui di kampus</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm" style="border-radius: 16px;">
                <div class="card-body p-4 p-lg-5">
                    <form method="POST" action="{{ url_for('new_report') }}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Kategori Laporan</label>
                            <select name="category_id" class="form-control" required>
                                <option value="" disabled selected>Pilih kategori...</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Judul Laporan</label>
                            <input type="text" name="title" class="form-control" placeholder="Contoh: AC Laboratorium tidak berfungsi" required maxlength="200">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Deskripsi Detail</label>
                            <textarea name="description" class="form-control" rows="5" placeholder="Jelaskan masalah secara detail..." required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Foto Bukti (Opsional)</label>
                            <input type="file" class="form-control" accept="image/*" disabled>
                            <small class="text-muted">Fitur upload foto akan segera hadir.</small>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary-custom px-4">
                                <i class="bi bi-send me-2"></i>Kirim Laporan
                            </button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4">
                                Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
