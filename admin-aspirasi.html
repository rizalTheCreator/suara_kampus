<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Aspirasi — Admin Suara Kampus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo" onclick="window.location.href='admin-dashboard.html'">
        <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
        <span class="logo-text">Suara<span>Kampus</span></span>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item" href="admin-dashboard.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</a>
        <a class="nav-item" href="admin-laporan.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>Kelola Laporan</a>
        <a class="nav-item active" href="admin-aspirasi.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>Kelola Aspirasi</a>
        <a class="nav-item" href="admin-mahasiswa.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>Mahasiswa</a>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-user" onclick="window.location.href='profile.html'">
            <div style="width:40px;height:40px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-weight:700">A</div>
            <div><div class="sidebar-user-name">Administrator</div><div class="sidebar-user-role">Admin</div></div>
        </div>
    </div>
</aside>

<div class="content-area">
    <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
            <button class="mobile-hamburger" id="hamburger-btn"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            <span class="topbar-title">Kelola Aspirasi</span>
        </div>
    </header>

    <main class="page-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
            <h2 style="font-size:20px;font-weight:700">Manajemen Aspirasi</h2>
            <select id="sort-select" class="form-input" style="width:180px" onchange="renderAspirasi()">
                <option value="likes">Terpopuler (Like)</option>
                <option value="newest">Terbaru</option>
                <option value="oldest">Terlama</option>
            </select>
        </div>

        <div class="filter-bar">
            <button class="filter-chip active" onclick="setFilter('semua',this)">Semua</button>
            <button class="filter-chip" onclick="setFilter('baru',this)">Baru</button>
            <button class="filter-chip" onclick="setFilter('ditinjau',this)">Ditinjau</button>
            <button class="filter-chip" onclick="setFilter('dipertimbangkan',this)">Dipertimbangkan</button>
            <button class="filter-chip" onclick="setFilter('diimplementasikan',this)">Diimplementasikan</button>
        </div>

        <div class="grid-2" id="aspirasi-list"></div>
    </main>
</div>

<div id="toast-container" class="toast-container"></div>
<script>
const user = JSON.parse(localStorage.getItem('sk_user') || 'null');
if (!user || !localStorage.getItem('sk_token') || user.role !== 'admin') window.location.href = 'login.html';

const ASPIRASI_DATA = [
    { id:1, kategori:'Fasilitas', judul:'Penambahan Hotspot WiFi di Area Perpustakaan', deskripsi:'Sinyal WiFi di perpustakaan sangat lemah.', mahasiswa:{nama:'Nurhuda',nim:'2407043'}, gambar:'https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=300', tags:['#wifi','#perpustakaan'], status:'dipertimbangkan', likes:48, dislikes:3, created_at:'2026-07-05' },
    { id:2, kategori:'Akademik', judul:'Perpanjangan Jam Buka Laboratorium Komputer', deskripsi:'Lab komputer hanya buka sampai 17.00.', mahasiswa:{nama:'Ahmad Fauzan',nim:'2307021'}, gambar:'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=300', tags:['#laboratorium','#akademik'], status:'ditinjau', likes:35, dislikes:2, created_at:'2026-07-08' },
    { id:3, kategori:'Infrastruktur', judul:'Perbaikan Kursi dan Meja di Ruang Kuliah', deskripsi:'Banyak kursi dan meja yang rusak.', mahasiswa:{nama:'Nurhuda',nim:'2407043'}, gambar:'https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=300', tags:['#meja','#kursi'], status:'baru', likes:22, dislikes:1, created_at:'2026-07-12' },
    { id:4, kategori:'Keamanan', judul:'Penambahan CCTV di Area Parkir Motor', deskripsi:'Area parkir tidak memiliki CCTV.', mahasiswa:{nama:'Siti Rahayu',nim:'2207089'}, gambar:'https://images.unsplash.com/photo-1555448248-2571daf6344b?w=300', tags:['#cctv','#parkir'], status:'diimplementasikan', likes:61, dislikes:0, created_at:'2026-06-20' },
];

let currentFilter = 'semua';
const statusMap = { baru:['neutral','Baru'], ditinjau:['primary','Ditinjau'], dipertimbangkan:['warning','Dipertimbangkan'], diimplementasikan:['success','Diimplementasikan'] };
const statusBadge = s => { const [c,l]=statusMap[s]||['neutral',s]; return `<span class="badge badge-${c}">${l}</span>`; };

function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderAspirasi();
}

function renderAspirasi() {
    const sort = document.getElementById('sort-select').value;
    let data = [...ASPIRASI_DATA];
    if (currentFilter !== 'semua') data = data.filter(a => a.status === currentFilter);
    if (sort === 'likes') data.sort((a,b) => b.likes - a.likes);
    else if (sort === 'newest') data.sort((a,b) => new Date(b.created_at)-new Date(a.created_at));
    else if (sort === 'oldest') data.sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
    const container = document.getElementById('aspirasi-list');
    if (!data.length) { container.innerHTML = '<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-icon">💡</div><h3>Tidak Ada Aspirasi</h3></div></div>'; return; }
    container.innerHTML = data.map(a => `
        <div class="card card-hover" style="padding:0;overflow:hidden" id="asp-card-${a.id}">
            <div style="height:140px;overflow:hidden"><img src="${a.gambar}" alt="${a.judul}" style="width:100%;height:100%;object-fit:cover;transition:transform 0.3s" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'"></div>
            <div style="padding:16px">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px">
                    <div>
                        <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">${a.kategori} · ${a.mahasiswa.nama}</div>
                        <h3 style="font-size:14px;font-weight:700;line-height:1.4">${a.judul}</h3>
                    </div>
                    ${statusBadge(a.status)}
                </div>
                <div style="display:flex;gap:8px;margin-bottom:12px">
                    <span style="font-size:12px;color:var(--success)">👍 ${a.likes}</span>
                    <span style="font-size:12px;color:var(--error)">👎 ${a.dislikes}</span>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:12px;font-weight:600;color:var(--text-secondary)">Update Status</label>
                    <div style="display:flex;gap:6px">
                        <div style="position:relative;flex:1">
                            <select id="asp-status-${a.id}" class="form-input" style="padding:8px 32px 8px 10px;font-size:12px;appearance:none">
                                <option value="baru" ${a.status==='baru'?'selected':''}>Baru</option>
                                <option value="ditinjau" ${a.status==='ditinjau'?'selected':''}>Ditinjau</option>
                                <option value="dipertimbangkan" ${a.status==='dipertimbangkan'?'selected':''}>Dipertimbangkan</option>
                                <option value="diimplementasikan" ${a.status==='diimplementasikan'?'selected':''}>Diimplementasikan</option>
                            </select>
                            <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-tertiary);font-size:10px">▼</div>
                        </div>
                        <button onclick="updateAspStatus(${a.id})" class="btn btn-primary btn-sm">Simpan</button>
                    </div>
                </div>
            </div>
        </div>`).join('');
}

function updateAspStatus(id) {
    const a = ASPIRASI_DATA.find(x => x.id === id);
    if (!a) return;
    const newStatus = document.getElementById(`asp-status-${id}`).value;
    a.status = newStatus;
    renderAspirasi();
    showToast(`Status aspirasi diperbarui: ${newStatus}`, 'success');
}

document.getElementById('hamburger-btn').addEventListener('click', () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('active'); });
document.getElementById('sidebar-overlay').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('active'); });

function showToast(msg, type='info') {
    const el = document.createElement('div'); el.className = 'toast';
    el.innerHTML = `<span>${{success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'}[type]}</span><span class="toast-msg">${msg}</span><button class="toast-close" onclick="this.closest('.toast').remove()">✕</button>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => { el.classList.add('removing'); setTimeout(()=>el.remove(),300); }, 3500);
}

renderAspirasi();
</script>
</body>
</html>
